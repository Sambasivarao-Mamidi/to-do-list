<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - My To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="greeting">
                <h1>Hello! 👋</h1>
                <p id="currentDate"></p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-item completed">
                    <span class="stat-number" id="doneCount">0</span>
                    <span class="stat-label">Done</span>
                </div>
                <div class="stat-item pending">
                    <span class="stat-number" id="pendingCount">0</span>
                    <span class="stat-label">Left</span>
                </div>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="What do you need to do today?"
                    autocomplete="off"
                >
                <button id="addBtn">
                    <span>Add Task</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" data-priority="high">🔥 High</button>
                <button class="quick-btn" data-priority="medium">⚡ Medium</button>
                <button class="quick-btn" data-priority="low">💤 Low</button>
            </div>
        </section>

        <!-- Filter Tabs -->
        <nav class="filter-tabs">
            <button class="tab active" data-filter="all">All Tasks</button>
            <button class="tab" data-filter="pending">Pending</button>
            <button class="tab" data-filter="completed">Completed</button>
        </nav>

        <!-- Task List -->
        <ul id="taskList" class="task-list">
            <!-- Tasks will be added here dynamically -->
        </ul>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <div class="empty-illustration">🎯</div>
            <h2>No tasks yet!</h2>
            <p>Add your first task above to get started</p>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <p id="motivationalText">Let's be productive today!</p>
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
